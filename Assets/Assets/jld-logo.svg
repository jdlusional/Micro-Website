<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 220" width="900" height="220">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Parisienne&amp;family=Cormorant+Garamond:ital,wght@0,300;1,300&amp;display=swap');
    </style>
  </defs>

  <!-- Navy background -->
  <rect width="900" height="220" fill="none"/>

  <!-- Name: Parisienne, gold -->
  <text
    x="450"
    y="128"
    text-anchor="middle"
    font-family="Parisienne, cursive"
    font-size="96"
    fill="#f1c400"
  >Jonathan Lin Davis</text>

  <!-- White rule flush beneath name -->
  <line x1="62" y1="140" x2="838" y2="140" stroke="white" stroke-width="1.5"/>

  <!-- Tagline: Cormorant Garamond 300, white, "thinking" gold italic underline -->
  <text
    y="174"
    text-anchor="middle"
    font-family="Cormorant Garamond, Georgia, serif"
    font-size="36"
    font-weight="300"
    fill="#ffffff"
  >
    <tspan x="450">The business of </tspan><tspan
      font-style="italic"
      fill="#f1c400"
      text-decoration="underline"
    >thinking</tspan><tspan> for a living.</tspan>
  </text>

</svg>
